    <rect x="140" y="112" width="14" height="34" rx="5" fill="#1e293b"/>
    <rect x="358" y="112" width="14" height="34" rx="5" fill="#1e293b"/>

    <rect x="174" y="234" width="164" height="12" rx="3" fill="#1e293b"/>
