<!DOCTYPE html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Theme color: must match vite.config.js manifest.theme_color.
         Tints the Chrome/Safari address bar on mobile. -->
    <meta name="theme-color" content="#0891b2" />

    <!-- Favicon: SVG is the master, PNG fallback for old browsers
         (Safari <12, anything before 2019) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />

    <!-- iOS home screen icon (180×180). iOS ignores the manifest icons
         array for home-screen saves, so this link is required. -->
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- iOS: launch from home screen in standalone mode (no Safari chrome) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="預假系統" />

    <title>預假系統</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
